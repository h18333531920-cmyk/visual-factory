<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GCC Design</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./styles.css">
  <script src="./config.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <main id="login-view" class="login-view">
    <section class="login-panel">
      <div class="brand-mark">G</div>
      <h1 data-i18n="loginTitle">GCC Design</h1>
      <p data-i18n="loginSubtitle">把素材、海报和动效集中在一个安静的创意工作台。</p>
      <form id="login-form" class="login-form">
        <label>
          <span data-i18n="email">邮箱</span>
          <input id="login-email" type="email" autocomplete="email" required>
        </label>
        <label>
          <span data-i18n="password">密码</span>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-btn" type="submit" data-i18n="signIn">登录</button>
      </form>
      <div id="login-message" class="message"></div>
      <div id="local-preview-actions" class="local-preview" hidden>
        <div data-i18n="localPreviewHint">本地预览模式仅用于检查界面，不会写入云端。</div>
        <button type="button" data-role="admin">Admin</button>
        <button type="button" data-role="designer">Designer</button>
        <button type="button" data-role="operator">Operator</button>
      </div>
    </section>
  </main>

  <main id="app-shell" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark small">G</div>
        <div>
          <strong>GCC Design</strong>
          <span data-i18n="workspace">Workspace</span>
        </div>
      </div>
      <nav id="nav-list" class="nav-list" aria-label="Main navigation"></nav>
      <div class="sidebar-footer">
        <button id="lang-toggle" class="ghost-btn" type="button">EN</button>
        <button id="sign-out-btn" class="ghost-btn danger" type="button" data-i18n="signOut">退出</button>
      </div>
    </aside>

    <section class="main-area">
      <header class="topbar">
        <div>
          <div id="route-kicker" class="kicker"></div>
          <h2 id="route-title"></h2>
        </div>
        <div class="topbar-actions">
          <button id="save-project-btn" class="secondary-btn" type="button" hidden data-i18n="saveProject">保存项目</button>
          <div id="user-chip" class="user-chip"></div>
        </div>
      </header>
      <section id="content" class="content"></section>
    </section>
  </main>

  <div id="project-modal" class="modal-backdrop" hidden>
    <section class="modal">
      <div class="modal-head">
        <h3 data-i18n="saveProject">保存项目</h3>
        <button class="icon-btn" id="close-project-modal" type="button" aria-label="Close">x</button>
      </div>
      <form id="project-form" class="stack-form">
        <label>
          <span data-i18n="projectName">项目名称</span>
          <input id="project-title-input" required maxlength="80">
        </label>
        <p id="project-save-note" class="muted"></p>
        <div id="project-modal-message" class="message"></div>
        <div class="modal-actions">
          <button class="ghost-btn" id="cancel-project-modal" type="button" data-i18n="cancel">取消</button>
          <button class="primary-btn" type="submit" data-i18n="save">保存</button>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
