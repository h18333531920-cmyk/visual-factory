<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Visual Super Factory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tus-js-client@3.1.3/dist/tus.min.js"></script>
<style>
  /* === 全局与视觉品牌变量 === */
  :root {
    --bg-color: #0b0d10;
    --panel-bg: #111318;
    --card-bg: #1a1d24;
    --border-color: #1f2329;
    --primary-accent: #ffe41f; /* 亮柠檬黄 */
    --secondary-accent: #11cc9a; /* 薄荷绿 */
    --text-main: #ffffff;
    --text-sub: #8a919f;
    --danger: #ff1493; /* 荧光粉 */
    --warning: #faad14;
    --sidebar-width: 260px;
  }

  body, html {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    background-color: var(--bg-color); color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }

  /* 电影感/赛博朋克光晕背景 */
  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 1400px; height: 900px;
    background: radial-gradient(circle, rgba(255, 228, 31, 0.08) 0%, rgba(17, 204, 154, 0.03) 40%, rgba(0, 0, 0, 0) 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: ambientBreathe 10s ease-in-out infinite alternate;
  }
  @keyframes ambientBreathe { 0% { transform: translate(-50%, 0) scale(1); opacity: 0.7; } 100% { transform: translate(-50%, 40px) scale(1.05); opacity: 1; } }

  /* === 登录弹窗 === */
  #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,13,16,0.9); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .login-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; width: 360px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
  .login-card h2 { margin: 0 0 10px 0; font-size: 24px; color: var(--primary-accent); }
  .login-card p { color: var(--text-sub); font-size: 14px; margin-bottom: 30px; }
  .login-btn { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #1a1d24; color: #fff; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .login-btn:hover { border-color: var(--primary-accent); background: rgba(255, 228, 31, 0.05); color: var(--primary-accent);}
  .login-btn.admin:hover { border-color: var(--danger); background: rgba(255, 20, 147, 0.05); color: var(--danger); }
  .login-btn.viewer:hover { border-color: var(--secondary-accent); background: rgba(17, 204, 154, 0.05); color: var(--secondary-accent); }

  /* === 整体布局 === */
  .app-container { display: flex; height: 100vh; width: 100vw; display: none; position: relative; z-index: 1;}
  
  /* --- 左侧边栏 --- */
  .sidebar { width: var(--sidebar-width); background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px 0; box-sizing: border-box; z-index: 10;}
  .logo-area { padding: 0 24px 30px 24px; border-bottom: 1px solid #1f2329; margin-bottom: 20px; }
  .editable-header-title { background: transparent; border: 1px dashed transparent; border-bottom: 1px dashed transparent; color: var(--primary-accent); font-size: 24px; font-weight: 900; letter-spacing: -0.5px; text-shadow: 0 0 20px rgba(255,228,31,0.2); outline: none; width: 100%; padding: 4px; margin: 0; margin-left: -4px; transition: all 0.2s; font-family: inherit; }
  .editable-header-title:hover, .editable-header-title:focus { border-bottom-color: var(--primary-accent); background: rgba(0,0,0,0.2); }
  
  .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
  .nav-item { padding: 14px 18px; border-radius: 12px; color: var(--text-sub); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; position: relative;}
  .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--primary-accent); background: rgba(255, 228, 31, 0.08); }
  /* 数量角标 */
  .nav-badge { margin-left: auto; background: #1f2329; color: var(--text-sub); font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: bold; transition: all 0.2s;}
  .nav-item.active .nav-badge { background: var(--primary-accent); color: #000; }
  
  .sidebar-footer { padding: 20px 24px 0 24px; border-top: 1px solid #1f2329; display: flex; flex-direction: column; gap: 12px; }
  .user-badge { background: #1a1d24; border: 1px solid #333; padding: 10px 14px; border-radius: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center;}
  .logout-btn { color: var(--danger); cursor: pointer; font-size: 12px; font-weight: bold; background: none; border: none; padding: 0; }
  .lang-switch { display: flex; gap: 12px; font-size: 13px; font-weight: 600; color: var(--text-sub); align-items: center; justify-content: center; }
  .lang-btn { cursor: pointer; transition: color 0.2s; }
  .lang-btn:hover { color: #fff; }
  .lang-btn.active { color: var(--primary-accent); }

  /* --- 右侧工作区 --- */
  .workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  .view-section { display: none; flex-direction: column; height: 100%; padding: 30px 40px; box-sizing: border-box; overflow: hidden; }
  .view-section.active { display: flex; }

  /* 顶部操作区 */
  .panel-header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .panel-header-wrap h2 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 12px;}
  .header-actions { display: flex; align-items: center; gap: 16px; }
  
  .controls-row { display: flex; gap: 12px; align-items: center; }
  .search-wrap { display: flex; align-items: center; background: rgba(0,0,0,0.3); border: 1px solid #2d3139; border-radius: 12px; padding: 4px 12px; height: 36px; box-sizing: border-box; transition: all 0.3s;}
  .search-wrap:focus-within { border-color: var(--primary-accent); box-shadow: 0 0 10px rgba(255,228,31,0.1); }
  .search-wrap input { background: transparent; border: none; color: #fff; outline: none; font-size: 13px; margin-left: 6px; width: 140px; transition: width 0.3s; }
  .search-wrap input:focus { width: 200px; }
  
  .sort-controls { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-sub); background: rgba(0,0,0,0.3); padding: 0 10px; border-radius: 12px; border: 1px solid #2d3139; height: 36px; box-sizing: border-box;}
  .sort-btn { cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: 0.2s; font-weight: 600;}
  .sort-btn.active { background: rgba(255, 228, 31, 0.1); color: var(--primary-accent); }

  .cloud-sync-status {
    margin-bottom: 12px;
    font-size: 12px;
    border: 1px solid #2d3139;
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text-sub);
    background: rgba(0,0,0,0.2);
  }
  .cloud-sync-status.ok { color: var(--secondary-accent); border-color: rgba(17,204,154,0.4); }
  .cloud-sync-status.warn { color: var(--warning); border-color: rgba(250,173,20,0.4); }
  .cloud-sync-status.err { color: var(--danger); border-color: rgba(255,20,147,0.45); }

  button { cursor: pointer; font-weight: 600; outline: none; transition: all 0.2s; border: none; }
  .btn-ghost { background: transparent; border: 1px solid #333; color: var(--text-sub); padding: 8px 16px; font-size: 13px; border-radius: 18px;}
  .btn-ghost:hover { border-color: var(--danger); color: var(--danger); }
  .btn-primary { background-color: var(--primary-accent); color: #000; padding: 8px 24px; font-size: 14px; border-radius: 18px; box-shadow: 0 0 15px rgba(255, 228, 31, 0.3); display: flex; align-items: center; gap: 6px;}
  .btn-primary:hover { background-color: #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }
  .btn-primary:disabled { background-color: #333; color: #666; box-shadow: none; cursor: not-allowed; }

  /* 标签筛选栏 */
  .tabs-container { margin-bottom: 24px; display: flex; flex-direction: column; gap: 14px; background: var(--panel-bg); padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border-color); flex-shrink: 0;}
  .tags-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-tag, .sub-filter-tag { padding: 6px 18px; border-radius: 18px; font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .filter-tag { background-color: var(--card-bg); color: var(--text-sub); border: 1px solid transparent; }
  .filter-tag.active { background-color: rgba(255, 228, 31, 0.1); color: var(--primary-accent); border-color: rgba(255, 228, 31, 0.3); }
  .sub-filter-tag { background: transparent; color: #5a606d; border: 1px solid #2a2d35; font-size: 12px; padding: 4px 16px; }
  .sub-filter-tag.active { background: #2a2d35; color: var(--secondary-accent); border-color: var(--secondary-accent); }
  .tab-divider { width: 100%; height: 1px; background-color: #1f2329; margin: 2px 0; }

  /* 画廊区域 */
  .gallery-scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding-right: 8px; width: 100%; border: 2px dashed transparent; border-radius: 16px; }
  .gallery-scroll-area.drag-over { border-color: var(--secondary-accent); background: rgba(17, 204, 154, 0.02); }
  .gallery-scroll-area::-webkit-scrollbar { width: 6px; }
  .gallery-scroll-area::-webkit-scrollbar-thumb { background: #2d3139; border-radius: 10px; }

  .gallery-masonry { column-count: 5; column-gap: 20px; width: 100%; }
  @media (max-width: 1700px) { .gallery-masonry { column-count: 4; } }
  @media (max-width: 1300px) { .gallery-masonry { column-count: 3; } }
  @media (max-width: 900px) { .gallery-masonry { column-count: 2; } }

  .image-card { break-inside: avoid; margin-bottom: 20px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; display: flex; flex-direction: column; position: relative; animation: slideFadeIn 0.4s ease forwards; transition: transform 0.2s, border-color 0.2s;}
  .image-card:hover { border-color: #333; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
  @keyframes slideFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .card-img-wrap { width: 100%; position: relative; background: #000; border-radius: 16px 16px 0 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 160px; cursor: zoom-in;}
  .card-img-wrap img { width: 100%; height: auto; display: block; transition: opacity 0.2s;}
  .card-img-wrap:hover img { opacity: 0.8; }
  .file-icon-placeholder { color: #4a505e; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 40px 0;}
  .card-img-wrap:hover .file-icon-placeholder { opacity: 0.8; }
  .file-icon-placeholder svg { width: 40px; height: 40px; }

  /* 极简卡片内容区 */
  .card-content { padding: 14px; display: flex; flex-direction: column; gap: 6px; background: var(--card-bg); border-radius: 0 0 16px 16px; }
  .brand-input { background: transparent; color: #fff; border: none; border-bottom: 1px dashed transparent; padding: 4px 0; font-size: 15px; font-weight: 600; outline: none; width: 100%; transition: border-color 0.2s; text-align: center;}
  .brand-input:focus { border-bottom-color: var(--primary-accent); }

  /* === 标签动态管理后台 === */
  .tag-admin-container { display: flex; gap: 40px; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); overflow-y: auto;}
  .tag-col { flex: 1; display: flex; flex-direction: column; gap: 30px; }
  .tag-group { display: flex; flex-direction: column; gap: 12px; }
  .tag-group h3 { margin: 0; font-size: 15px; color: var(--text-main); font-weight: 600; border-bottom: 1px solid #2d3139; padding-bottom: 8px;}
  .tag-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .tag-edit-item { display: flex; align-items: center; gap: 6px; background: var(--panel-bg); border: 1px solid #2d3139; padding: 6px 10px 6px 14px; border-radius: 20px; font-size: 13px; transition: border-color 0.2s;}
  .tag-edit-item:hover { border-color: var(--primary-accent); }
  .tag-edit-item.locked { color: #5c6370; border-color: transparent; background: #1f2329; padding-right: 14px; pointer-events: none;}
  .btn-del-tag { background: none; border: none; color: #5c6370; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; padding: 0; transition: color 0.2s;}
  .btn-del-tag:hover { color: var(--danger); }
  .add-tag-box { display: flex; align-items: center; gap: 8px; margin-top: 4px; max-width: 300px;}
  .add-tag-input { background: #0b0d10; border: 1px solid #2d3139; color: #fff; padding: 8px 12px; border-radius: 8px; outline: none; font-size: 13px; flex: 1; transition: border-color 0.2s;}
  .add-tag-input:focus { border-color: var(--primary-accent); }
  .btn-add-tag { background: var(--panel-bg); border: 1px solid #333; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: bold; font-size: 13px;}
  .btn-add-tag:hover { background: var(--secondary-accent); color: #000; border-color: var(--secondary-accent);}

  /* 状态与全局工具 */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; grid-column: 1 / -1; height: 500px; border: 2px dashed #2d3139; border-radius: 20px; color: #4a505e; cursor: pointer; width: 100%; transition: border-color 0.2s, color 0.2s; }
  .empty-state:hover { border-color: var(--primary-accent); color: var(--primary-accent); }
  .loading-state { grid-column: 1 / -1; display: flex; justify-content: center; align-items: center; height: 300px; color: var(--primary-accent); font-size: 16px; font-weight: bold;}
  .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .readonly-input { pointer-events: none; border-bottom-color: transparent !important; }

  /* === 详情/上传 交互弹窗通用样式 === */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; width: 85%; max-width: 1100px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8); animation: modalIn 0.3s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  
  .modal-header { padding: 20px 30px; border-bottom: 1px solid #1f2329; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg);}
  .modal-header h3 { margin: 0; font-size: 22px; color: var(--primary-accent); font-weight: 800;}
  .btn-close { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 32px; padding: 0; transition: color 0.2s; line-height: 1; }
  .btn-close:hover { color: var(--danger); }
  
  .modal-body { flex: 1; overflow: auto; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b0d10; min-height: 450px;}
  .modal-body img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);}
  .modal-body .file-placeholder { color: #4a505e; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .modal-body .file-placeholder svg { width: 80px; height: 80px; }

  .glass-select { appearance: none; -webkit-appearance: none; background: #1f2329; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; padding: 6px 24px 6px 12px; cursor: pointer; outline: none; transition: border-color 0.2s;}
  .glass-select:focus { border-color: var(--primary-accent); }
  .glass-select.primary { font-size: 13px; font-weight: 600; color: var(--primary-accent); }
  .glass-select.secondary { font-size: 13px; color: var(--secondary-accent); }
  .glass-select.tertiary { font-size: 12px; color: #fff; }
  
  .modal-footer { padding: 20px 30px; border-top: 1px solid #1f2329; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); gap: 20px; flex-wrap: wrap;}
  
  .modal-logo-section { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: #0b0d10; border: 1px dashed #2d3139; border-radius: 16px; padding: 10px 20px; flex: 1; max-width: 450px; transition: border-color 0.2s; cursor: pointer;}
  .modal-logo-section:hover { border-color: var(--primary-accent); }
  .logo-preview-area { display: flex; align-items: center; gap: 12px; flex: 1; height: 40px;}
  .logo-placeholder-text { font-size: 14px; color: #5c6370; font-weight: 600;}
  .logo-thumbnail { height: 100%; width: auto; max-width: 150px; object-fit: contain; border-radius: 6px; }
  
  .btn-download-small { background: #1f2329; border: 1px solid #333; color: var(--text-main); padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;}
  .btn-download-small:hover { background: rgba(17, 204, 154, 0.15); color: var(--secondary-accent); border-color: var(--secondary-accent); }
  .btn-download-small:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .modal-right-actions { display: flex; align-items: center; gap: 24px; }
  .btn-download-large { background: var(--primary-accent); color: #000; padding: 14px 32px; border-radius: 24px; font-weight: 800; font-size: 15px; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; white-space: nowrap; box-shadow: 0 0 20px rgba(255,228,31,0.2);}
  .btn-download-large:hover { background: #fff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); transform: translateY(-2px);}

  /* 上传强制预览区样式 */
  .upload-source-info { background: #1a1d24; padding: 16px 20px; border-radius: 12px; border: 1px solid #2d3139; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .upload-source-info strong { color: var(--primary-accent); font-size: 18px; word-break: break-all; }
  .upload-source-info span { color: var(--text-sub); font-size: 13px; }
  
  #preview-drop-zone { border: 2px dashed #2d3139; padding: 40px; text-align: center; border-radius: 16px; cursor: pointer; transition: all 0.3s; background: rgba(0,0,0,0.2); width: 100%; box-sizing: border-box; }
  #preview-drop-zone:hover, #preview-drop-zone.drag-over { border-color: var(--primary-accent); background: rgba(255, 228, 31, 0.05); }
  
  .preview-thumbnails-container { display: flex; gap: 12px; margin-top: 20px; overflow-x: auto; width: 100%; padding-bottom: 10px; }
  .preview-thumb-box { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
  .preview-thumb-box img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb-remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.8); color: var(--danger); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: none; padding: 0; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div id="login-overlay">
  <div class="login-card">
    <h2 id="txt-login-title">Visual Factory Auth</h2>
    <p id="txt-login-sub">请选择测试角色登录系统</p>
    <button class="login-btn admin" onclick="login('admin')"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>视觉负责人 (Admin)</button>
    <button class="login-btn" onclick="login('designer')"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>AI设计师-张三 (Designer)</button>
    <button class="login-btn viewer" onclick="login('viewer')"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>营销运营-李四 (Viewer)</button>
  </div>
</div>

<div class="app-container" id="app-main">
  <aside class="sidebar">
    <div class="logo-area">
      <input type="text" id="editable-title" class="editable-header-title" value="Visual Factory" placeholder="主标题...">
      <p style="margin: 8px 0 0 0; font-size: 12px; color: var(--secondary-accent); text-transform: uppercase; letter-spacing: 1px;">Super Factory</p>
    </div>
    
    <nav class="nav-menu">
      <div class="nav-item active" onclick="switchView('assets')" id="nav-assets">
        <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        <span id="txt-nav-assets">成图图库</span>
        <span class="nav-badge" id="badge-assets">0</span>
      </div>
      <div class="nav-item hide-for-viewer" onclick="switchView('sources')" id="nav-sources">

  function escapeHtml(value) {
    return String(value ?? '')

      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(value) {
    return escapeHtml(value);

  function extractStoragePathFromUrl(publicUrl, bucket) {
    if(!publicUrl) return null;
    const markers = [
      `/storage/v1/object/public/${bucket}/`,
      `/storage/v1/object/sign/${bucket}/`,
      `/storage/v1/object/authenticated/${bucket}/`
    ];
    for(const marker of markers) {
      const idx = publicUrl.indexOf(marker);
      if(idx === -1) continue;
      const raw = publicUrl.slice(idx + marker.length);
      const noQuery = raw.split('?')[0].split('#')[0];
      return decodeURIComponent(noQuery);
    }
    return null;
  }

  function buildDownloadUrl(url, filename) {
    if(!url) return url;
    const sep = url.includes('?') ? '&' : '?';
    return `${url}${sep}download=${encodeURIComponent(filename || 'asset')}`;
  }

    if(vfSupabaseClient) return vfSupabaseClient;

      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = SUPABASE_BACKUP_CDN;
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error('Supabase CDN 加载失败'));
        document.head.appendChild(script);
      });
    }
    if(!window.supabase || typeof window.supabase.createClient !== 'function') {
      throw new Error('Supabase SDK 未成功加载');
    }
    vfSupabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function ensureTusClient() {
    if(window.tus && typeof window.tus.Upload === 'function') return;

      throw new Error('Tus SDK 未成功加载');

  }

  function getResumableEndpoints() {
    const list = [];
    try {
      const host = new URL(supabaseUrl).hostname;
      const projectRef = host.split('.')[0];
      if(projectRef) list.push(`https://${projectRef}.storage.supabase.co/storage/v1/upload/resumable`);
    } catch (_) {}
    list.push(`${supabaseUrl}/storage/v1/upload/resumable`);
    return list;
  }

  function tusUploadOnce(endpoint, objectPath, file, onProgress) {
    return new Promise((resolve, reject) => {
      const upload = new window.tus.Upload(file, {
        endpoint,
        retryDelays: [0, 3000, 5000, 10000, 20000],
        uploadDataDuringCreation: true,
        removeFingerprintOnSuccess: true,
        chunkSize: 6 * 1024 * 1024,
        headers: {
          authorization: `Bearer ${supabaseKey}`,
          apikey: supabaseKey,
          'x-upsert': 'false'
        },
        metadata: {
          bucketName: 'visual-assets',
          objectName: objectPath,
          contentType: file.type || 'application/octet-stream',
          cacheControl: '3600'
        },
        onError: reject,
        onProgress: (bytesUploaded, bytesTotal) => {
          if(typeof onProgress === 'function') onProgress(bytesUploaded, bytesTotal);
        },
        onSuccess: () => resolve()
      });
      upload.start();
    });
  }

  async function uploadWithResumable(objectPath, file, onProgress) {
    await ensureTusClient();
    const endpoints = getResumableEndpoints();
    let lastError = null;
    for(const endpoint of endpoints) {
      try {
        await tusUploadOnce(endpoint, objectPath, file, onProgress);
        return;
      } catch (err) {
        lastError = err;
      }
    }
    throw lastError || new Error('分片上传失败');
  }

  async function uploadToVisualAssets(objectPath, file, opts = {}) {
    const { preferResumable = false, onProgress = null } = opts;
    await ensureSupabaseClient();

    if(preferResumable) {
      try {
        await uploadWithResumable(objectPath, file, onProgress);
        return;
      } catch (err) {
        showCloudStatus(`云端状态：分片上传不可用，回退普通上传（${readCloudError(err, '未知错误')}）`, 'warn');
      }
    }

    const { error } = await vfSupabaseClient.storage.from('visual-assets').upload(objectPath, file, { upsert: false });
    if(error) throw error;
    if(typeof onProgress === 'function') onProgress(file.size, file.size);
  }

  async function login(roleKey) {
    const isLocalEnv =
      location.protocol === 'file:' ||
      location.hostname === 'localhost' ||
      location.hostname === '127.0.0.1';
    const isVercelHost = location.hostname.endsWith('.vercel.app');
    const forcePasswordless = isLocalEnv || isVercelHost;

    let resolvedUser = null;
    try {
      if (forcePasswordless) {
        resolvedUser = mapRoleToFallbackUser(roleKey);
      } else {
        const serverLogin = await tryServerLogin(roleKey);
        if (serverLogin.cancelled) return;
        if (serverLogin.user) {
          resolvedUser = {
            id: serverLogin.user.id || `u_${serverLogin.user.role || roleKey}`,
            name: serverLogin.user.name || mapRoleToFallbackUser(roleKey).name,
            role: serverLogin.user.role || roleKey
          };
        } else if (serverLogin.fallback) {
          resolvedUser = mapRoleToFallbackUser(roleKey);
        }
      }
    } catch (error) {
      alert(`登录失败：${readCloudError(error, '未知错误')}`);
      return;
    }

    currentUser = resolvedUser || mapRoleToFallbackUser(roleKey);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-main').style.display = 'flex';
    document.getElementById('current-user-name').innerText = currentUser.name + ` (${currentUser.role})`;
    applyRolePermissions();
    showCloudStatus('云端状态：正在连接...', 'warn');
    try {
      await ensureSupabaseClient();
      await loadDataFromCloud();
      await setupCloudSync();
      updateI18nTexts();
      switchView('assets');
    } catch (error) {
      const msg = readCloudError(error, '云端连接失败');
      showCloudStatus(`云端状态：连接失败（${msg}）`, 'err');
      galleryContainer.innerHTML = `<div class="loading-state">云端连接失败：${msg}</div>`;
    }
  }

  async function loadDataFromCloud(silent = false) {
    if(!silent) galleryContainer.innerHTML = '<div class="loading-state">🚀 正在通过云端引擎同步资产...</div>';
    await ensureSupabaseClient();
    let data = null;
    let error = null;

    ({ data, error } = await vfSupabaseClient
      .from('assets_library')
      .select('*')
      .order('created_at', { ascending: false }));

    if (error && /created_at.*does not exist/i.test(readCloudError(error, ''))) {
      ({ data, error } = await vfSupabaseClient
        .from('assets_library')
        .select('*'));
      if (!error) {
        showCloudStatus('云端状态：字段兼容模式（建议补齐 created_at）', 'warn');
      }
    }

    if (error) {
      const msg = readCloudError(error, '加载云端数据失败');
      showCloudStatus(`云端状态：同步失败（${msg}）`, 'err');
      if(!silent) galleryContainer.innerHTML = `<div class="loading-state">同步失败：${msg}</div>`;
      return;
    }

    imageLibrary = data.map(record => {
      const ext = (record.file_name || '').split('.').pop().toLowerCase();
      const isSource = ['psd', 'ai', 'eps', 'pdf'].includes(ext) || (record.file_type && (record.file_type.includes('photoshop') || record.file_type.includes('illustrator')));
      const rawTs = record.created_at ? Date.parse(record.created_at) : NaN;
      const safeTs = Number.isFinite(rawTs) ? rawTs : Date.now();

      return {
        id: String(record.id),
        url: record.file_url,
        logoUrl: record.logo_url || null,
        coverUrl: record.cover_url || null,
        fileName: record.file_name || 'Asset',
        fileType: record.file_type || 'image/png',
        fileSize: 0, // 避免再让你加字段，隐藏处理
        libType: isSource ? 'sources' : 'assets',
        brandName: record.brand_name || '',
        g_l1: record.g_l1 || '未分类', g_l2: record.g_l2 || '全部',
        s_l1: record.s_l1 || '全部', s_l2: record.s_l2 || '全部', s_l3: record.s_l3 || '通用',
        uploader_name: record.uploader_name,
        timestamp: safeTs,
        downloads: 0,
        uploader_id: record.uploader_name === currentUser.name ? currentUser.id : 'others'
      };
    });
    lastSyncAt = Date.now();
    const timeText = new Date(lastSyncAt).toLocaleTimeString();
    showCloudStatus(`云端状态：已连接，最近同步 ${timeText}`, 'ok');
  }

  function renderTagManager() {
    const buildList = (arr, type, lockWord) => arr.map(tag => {

        return `<div class="tag-edit-item">${tag} <button class="btn-del-tag" onclick="deleteTag('${type}', '${tag}')">&times;</button></div>`;
    }).join('');

    document.getElementById('admin-g-l1-list').innerHTML = buildList(g_l1_tags, 'g_l1', '通用');
    document.getElementById('admin-g-l2-list').innerHTML = buildList(g_l2_tags, 'g_l2', '全部');
    document.getElementById('admin-s-l1-list').innerHTML = buildList(s_l1_tags, 's_l1', '全部');
    document.getElementById('admin-s-l2-list').innerHTML = buildList(s_l2_tags, 's_l2', '全部');
    document.getElementById('admin-s-l3-list').innerHTML = buildList(s_l3_tags, 's_l3', '通用');

  window.addNewTag = (type) => {
    const input = document.getElementById('input-add-' + type.replace('_', '-'));
    const val = input.value.trim();
    if(!val) return;
    
    if(type === 'g_l1' && !g_l1_tags.includes(val)) g_l1_tags.push(val);
    else if(type === 'g_l2' && !g_l2_tags.includes(val)) g_l2_tags.push(val);
    else if(type === 's_l1' && !s_l1_tags.includes(val)) s_l1_tags.push(val);
    else if(type === 's_l2' && !s_l2_tags.includes(val)) s_l2_tags.push(val);
    else if(type === 's_l3' && !s_l3_tags.includes(val)) s_l3_tags.push(val);
    
    saveTags(); input.value = ''; renderTagManager();

  window.deleteTag = (type, tag) => {
    if(confirm(`确定要删除标签 [${tag}] 吗？\n所有属于此标签的素材将被退回至默认分类。`)) {
        let defaultVal = '全部'; if(type === 'g_l1') defaultVal = '未分类'; if(type === 's_l3') defaultVal = '通用';
        
        if(type === 'g_l1') g_l1_tags = g_l1_tags.filter(t => t !== tag);
        else if(type === 'g_l2') g_l2_tags = g_l2_tags.filter(t => t !== tag);
        else if(type === 's_l1') s_l1_tags = s_l1_tags.filter(t => t !== tag);
        else if(type === 's_l2') s_l2_tags = s_l2_tags.filter(t => t !== tag);
        else if(type === 's_l3') s_l3_tags = s_l3_tags.filter(t => t !== tag);

        imageLibrary.forEach(img => { if(img[type] === tag) { img[type] = defaultVal; updateAssetField(img.id, type, defaultVal); } });
        saveTags(); renderTagManager();
    }
  }

  function renderGallery() {
    const t = i18n[currentLang];
    galleryContainer.innerHTML = ''; 
    
    const countAssets = imageLibrary.filter(img => img.libType === 'assets').length;
    const countSources = imageLibrary.filter(img => img.libType === 'sources').length;
    document.getElementById('badge-assets').innerText = countAssets;
    document.getElementById('badge-sources').innerText = countSources;

    let filteredImages = imageLibrary.filter(img => {
      if(img.libType !== currentView) return false;
      if (currentSearch !== '' && !(img.brandName || '').toLowerCase().includes(currentSearch)) return false;

      if (currentView === 'assets') {
          return (cur_g_l1 === '未分类' || img.g_l1 === cur_g_l1) && (cur_g_l2 === '全部' || img.g_l2 === cur_g_l2);
      } else {
          return (cur_s_l1 === '全部' || img.s_l1 === cur_s_l1) && (cur_s_l2 === '全部' || img.s_l2 === cur_s_l2) && (cur_s_l3 === '通用' || img.s_l3 === cur_s_l3);
      }
    }).sort((a, b) => {
      if (currentSort === 'az') return (a.brandName || 'zzzz').toLowerCase().localeCompare((b.brandName || 'zzzz').toLowerCase());
      if (currentSort === 'downloads') return b.downloads - a.downloads;
      return b.timestamp - a.timestamp;
    });

    if (filteredImages.length === 0) {
      galleryContainer.style.columnCount = 1; 
      const emptyTxt = currentUser.role === 'viewer' ? t.empty_viewer : t.empty_state;
      const clickEvt = currentUser.role === 'viewer' ? '' : `onclick="document.getElementById('hidden-file-input').click()"`;
      galleryContainer.innerHTML = `<div class="empty-state" ${clickEvt}><p>${emptyTxt}</p></div>`; return;
    }

    galleryContainer.style.columnCount = ''; 
    const fragment = document.createDocumentFragment();

    filteredImages.forEach(imgData => {
      const card = document.createElement('div');
      card.className = 'image-card';
      
      const isOwner = imgData.uploader_id === currentUser.id;
      const canEdit = currentUser.role === 'admin' || (currentUser.role === 'designer' && isOwner);

              ${filePlaceholderSVG}

          ${mediaHTML}

  window.updateAssetField = async (id, field, value) => {
    const img = imageLibrary.find(i => sameId(i.id, id));
    if (img) { 
      try {
        img[field] = value; 
        // 映射到你的数据库列名
        const dbFieldMap = { 'brandName': 'brand_name', 'g_l1': 'g_l1', 'g_l2': 'g_l2', 's_l1': 's_l1', 's_l2': 's_l2', 's_l3': 's_l3' };
        const dbField = dbFieldMap[field] || field;
        
        if (Object.values(dbFieldMap).includes(dbField)) {
          await ensureSupabaseClient();
          const { error } = await vfSupabaseClient.from('assets_library').update({ [dbField]: value }).eq('id', id);
          if(error) throw error;
        }
        if(currentModalImgId && sameId(currentModalImgId, id) && field === 'brandName') renderModal(); 
        showCloudStatus('云端状态：字段更新成功', 'ok');
      } catch (error) {
        showCloudStatus(`云端状态：字段更新失败（${readCloudError(error, '未知错误')}）`, 'err');
      }
    }
  };

  window.changeSort = (type, el) => { currentSort = type; document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); renderGallery(); };

  window.deleteImage = async (id) => {
    const index = imageLibrary.findIndex(i => sameId(i.id, id));
    if(index < 0) return false;
    const img = imageLibrary[index];
    imageLibrary.splice(index, 1);
    renderGallery();
    try {
      await ensureSupabaseClient();
      const removePaths = [
        extractStoragePathFromUrl(img.url, 'visual-assets'),
        extractStoragePathFromUrl(img.coverUrl, 'visual-assets'),
        extractStoragePathFromUrl(img.logoUrl, 'visual-assets')
      ].filter(Boolean);
      if(removePaths.length > 0) {
        const { error: removeErr } = await vfSupabaseClient.storage.from('visual-assets').remove(removePaths);
        if(removeErr) throw removeErr;
      }
      const { error } = await vfSupabaseClient.from('assets_library').delete().eq('id', id);
      if(error) throw error;
      showCloudStatus('云端状态：素材删除成功', 'ok');
      return true;
    } catch (error) {
      imageLibrary.splice(index, 0, img);
      renderGallery();
      showCloudStatus(`云端状态：删除失败（${readCloudError(error, '未知错误')}）`, 'err');
      return false;
    }
  };

  window.deleteImageFromModal = async (id) => {
    const ok = await window.deleteImage(id);
    if (ok) closeDetailModal();
  };

  window.triggerDownload = async (id, type, originalName) => {
    const img = imageLibrary.find(i => sameId(i.id, id)); if(!img) return;
    const url = type === 'main' ? img.url : img.logoUrl;
    if(!url || url === 'null') {
      showCloudStatus('云端状态：下载失败（文件链接为空）', 'err');
      return;
    }
    let ext = '.png';
    if(originalName && originalName.includes('.')) ext = originalName.substring(originalName.lastIndexOf('.'));
    const downloadName = safeDownloadName((img.brandName || 'Asset') + '_' + type + ext, ext);

    const triggerBlobDownload = (blob) => {
      const localUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = localUrl;
      a.download = downloadName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(localUrl);
      showCloudStatus('云端状态：下载已开始', 'ok');
    };

    try {
      const directUrl = buildDownloadUrl(url, downloadName);
      const directA = document.createElement('a');
      directA.href = directUrl;
      directA.download = downloadName;
      directA.rel = 'noopener';
      document.body.appendChild(directA);
      directA.click();
      document.body.removeChild(directA);
      showCloudStatus('云端状态：下载已开始', 'ok');
      return;
    } catch (_) {}

    try {
      await ensureSupabaseClient();
      const storagePath = extractStoragePathFromUrl(url, 'visual-assets');
      if (storagePath) {
        const { data: fileBlob, error: fileErr } = await vfSupabaseClient.storage.from('visual-assets').download(storagePath);
        if(!fileErr && fileBlob) {
          triggerBlobDownload(fileBlob);
          return;
        }
      }
    } catch (_) {}

    fetch(url, { mode: 'cors' })
      .then(resp => {
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.blob();
      })
      .then(blob => {
        triggerBlobDownload(blob);
      })
      .catch(() => {
        window.open(url, '_blank', 'noopener');
        showCloudStatus('云端状态：下载回退为新窗口打开（浏览器跨域限制）', 'warn');
      });
  };

  // ==========================================
  // 核心 3：智能双轨上传 (直接传云)
  // ==========================================
  async function handleFilesAdded(files) {
    if (currentUser.role === 'viewer' || !files || files.length === 0) return;
    
    let sourceFiles = [];
    let standardImages = [];

    Array.from(files).forEach(file => {
      const ext = file.name.split('.').pop().toLowerCase();
      const validImages = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'];
      
      if (['psd', 'ai', 'eps', 'pdf'].includes(ext)) sourceFiles.push(file);
      else if (file.type.startsWith('image/') || validImages.includes(ext)) standardImages.push(file);
    });

    // 处理源文件 (拉起预览图弹窗)
    if (sourceFiles.length > 0) {
      if(sourceFiles.length > 1) alert("检测到多个源文件，系统已载入第一个。为保证精准匹配，请逐个上传源文件。");
      pendingSourceFile = sourceFiles[0];
      if (pendingSourceFile.size > 50 * 1024 * 1024) {
        showCloudStatus('云端状态：大文件将自动启用分片上传（支持断点续传）', 'warn');
      }
      if (pendingSourceFile.size > 200 * 1024 * 1024) {
        showCloudStatus('云端状态：源文件较大（>200MB），上传可能较慢，请耐心等待', 'warn');
      }
      pendingPreviewFiles = [];
      document.getElementById('pending-file-name').innerText = pendingSourceFile.name;
      document.getElementById('pending-file-size').innerText = formatBytes(pendingSourceFile.size);
      document.getElementById('preview-thumbnails-container').innerHTML = '';
      document.getElementById('btn-confirm-upload').disabled = true;
      document.getElementById('upload-source-modal').classList.add('show');
    }

    // 处理普通成图 (直接云端直传)
    if (standardImages.length > 0) {
      galleryContainer.innerHTML = '<div class="loading-state">🚀 正在将普通成图传输至云端...</div>';
      try {
        await ensureSupabaseClient();
        for(let file of standardImages) {
          const ext = file.name.split('.').pop().toLowerCase();
          const filePath = `assets/${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${ext}`;
          
          await uploadToVisualAssets(filePath, file, { preferResumable: file.size > 25 * 1024 * 1024 });
          const { data: urlData } = vfSupabaseClient.storage.from('visual-assets').getPublicUrl(filePath);

          const { error: insertError } = await vfSupabaseClient.from('assets_library').insert([{
              file_url: urlData.publicUrl,
              file_name: file.name,
              file_type: file.type || ext,
              brand_name: '',
              g_l1: currentView === 'assets' ? cur_g_l1 : '未分类',
              g_l2: currentView === 'assets' ? cur_g_l2 : '全部',
              s_l1: '全部', s_l2: '全部', s_l3: '通用',
              uploader_name: currentUser.name
          }]);
          if(insertError) throw insertError;
        }
        await loadDataFromCloud();
        if(currentView === 'tags') switchView('assets'); else renderGallery();
      } catch (error) {
        showCloudStatus(`云端状态：上传失败（${readCloudError(error, '未知错误')}）`, 'err');
      }
    }
  }

  scrollArea.addEventListener('drop', e => { e.preventDefault(); scrollArea.classList.remove('drag-over'); if(currentUser.role !== 'viewer') handleFilesAdded(e.dataTransfer.files); });
  document.getElementById('hidden-file-input').addEventListener('change', e => { handleFilesAdded(e.target.files); e.target.value = ''; });

  // 预览窗内部交互
  window.cancelUploadSource = () => {
    pendingSourceFile = null;
    pendingPreviewFiles.forEach(pf => URL.revokeObjectURL(pf.previewUrl));
    pendingPreviewFiles = [];
    document.getElementById('upload-source-modal').classList.remove('show');
    document.getElementById('hidden-modal-preview-input').value = '';
  }

  function handlePreviewAdd(files) {
    if(!files || files.length === 0) return;
    Array.from(files).forEach(file => {
        if(file.type.startsWith('image/')) {
            pendingPreviewFiles.push({ file: file, previewUrl: URL.createObjectURL(file) });
        }
    });
    renderPreviewThumbnails();
  }
  
  function renderPreviewThumbnails() {
    const container = document.getElementById('preview-thumbnails-container');
    container.innerHTML = pendingPreviewFiles.map((pf, index) => `
        <div class="preview-thumb-box">
            <img src="${pf.previewUrl}">
            <button class="preview-thumb-remove" onclick="event.stopPropagation(); removePendingPreview(${index})">&times;</button>
        </div>
    `).join('');
    document.getElementById('btn-confirm-upload').disabled = pendingPreviewFiles.length === 0;
  }

  window.removePendingPreview = (index) => {
      URL.revokeObjectURL(pendingPreviewFiles[index].previewUrl);
      pendingPreviewFiles.splice(index, 1);
      renderPreviewThumbnails();
  }

  const modalDropZone = document.getElementById('preview-drop-zone');
  modalDropZone.ondragover = e => { e.preventDefault(); modalDropZone.classList.add('drag-over'); };
  modalDropZone.ondragleave = e => { e.preventDefault(); modalDropZone.classList.remove('drag-over'); };
  modalDropZone.ondrop = e => { e.preventDefault(); modalDropZone.classList.remove('drag-over'); handlePreviewAdd(e.dataTransfer.files); };
  document.getElementById('hidden-modal-preview-input').addEventListener('change', e => { handlePreviewAdd(e.target.files); e.target.value = ''; });

  // 核心 4：源文件与预览图一并打包传云
  window.confirmSourceUpload = async () => {
    if(!pendingSourceFile || pendingPreviewFiles.length === 0) return;

    const btn = document.getElementById('btn-confirm-upload');
    btn.disabled = true; btn.innerText = '上传源文件(1/2)...';

    try {
      await ensureSupabaseClient();
      let fileTypeTag = '';
      const srcExt = pendingSourceFile.name.split('.').pop().toLowerCase();
      if(srcExt === 'psd') fileTypeTag = 'image/vnd.adobe.photoshop'; else if(srcExt === 'ai' || srcExt === 'eps') fileTypeTag = 'application/illustrator'; else fileTypeTag = pendingSourceFile.type;

      const srcPath = `sources/${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${srcExt}`;
      await uploadToVisualAssets(srcPath, pendingSourceFile, {
        preferResumable: pendingSourceFile.size > 25 * 1024 * 1024,
        onProgress: (uploaded, total) => {
          const pct = total > 0 ? Math.max(1, Math.min(99, Math.floor((uploaded / total) * 100))) : 1;
          btn.innerText = `上传源文件(1/2)... ${pct}%`;
          showCloudStatus(`云端状态：源文件上传中 ${pct}%`, 'warn');
        }
      });
      const { data: srcUrlData } = vfSupabaseClient.storage.from('visual-assets').getPublicUrl(srcPath);

      btn.innerText = '上传预览图并入库(2/2)...';
      for(let i=0; i<pendingPreviewFiles.length; i++) {
          const preview = pendingPreviewFiles[i];
          const prevExt = preview.file.name.split('.').pop().toLowerCase();
          const prevPath = `covers/${Date.now()}_${Math.random().toString(36).substr(2, 5)}_${i}.${prevExt}`;
          
          await uploadToVisualAssets(prevPath, preview.file, { preferResumable: false });
          const { data: prevUrlData } = vfSupabaseClient.storage.from('visual-assets').getPublicUrl(prevPath);

          const { error: insertError } = await vfSupabaseClient.from('assets_library').insert([{
              file_url: srcUrlData.publicUrl,
              cover_url: prevUrlData.publicUrl,
              file_name: pendingSourceFile.name,
              file_type: fileTypeTag,
              brand_name: '',
              g_l1: '未分类', g_l2: '全部',
              s_l1: currentView === 'sources' ? cur_s_l1 : '全部',
              s_l2: currentView === 'sources' ? cur_s_l2 : '全部',
              s_l3: currentView === 'sources' ? cur_s_l3 : '通用',
              uploader_name: currentUser.name
          }]);
          if(insertError) throw insertError;
      }

      cancelUploadSource();
      btn.innerText = '确认入库';
      await loadDataFromCloud();
      if(currentView !== 'sources') switchView('sources'); else renderGallery();
      showCloudStatus('云端状态：源文件入库成功', 'ok');
    } catch (error) {
      btn.disabled = false;
      btn.innerText = '确认入库';
      showCloudStatus(`云端状态：源文件入库失败（${readCloudError(error, '未知错误')}）`, 'err');
    }
  }

  // 核心 5：替换封面/Logo 上云引擎
  window.triggerSingleCoverReplace = (id) => { targetCoverCardId = id; document.getElementById('hidden-single-cover-input').click(); };
  document.getElementById('hidden-single-cover-input').addEventListener('change', async e => {
    if (!targetCoverCardId || e.target.files.length === 0) return;
    
    try {
      await ensureSupabaseClient();
      const file = e.target.files[0];
      const ext = file.name.split('.').pop().toLowerCase();
      const filePath = `covers/${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${ext}`;

      await uploadToVisualAssets(filePath, file, { preferResumable: false });
      const { data: urlData } = vfSupabaseClient.storage.from('visual-assets').getPublicUrl(filePath);

      const { error } = await vfSupabaseClient.from('assets_library').update({ cover_url: urlData.publicUrl }).eq('id', targetCoverCardId);
      if(error) throw error;
      
      e.target.value = '';
      await loadDataFromCloud();
      renderGallery();
      if(currentModalImgId && sameId(currentModalImgId, targetCoverCardId)) renderModal();
      showCloudStatus('云端状态：预览图替换成功', 'ok');
    } catch (error) {
      showCloudStatus(`云端状态：预览图替换失败（${readCloudError(error, '未知错误')}）`, 'err');
    }
  });

  window.triggerLogoUpload = (id) => { targetLogoCardId = id; document.getElementById('hidden-logo-input').click(); };
  document.getElementById('hidden-logo-input').addEventListener('change', async e => {
    if (!targetLogoCardId || e.target.files.length === 0) return;
    
    try {
      await ensureSupabaseClient();
      const file = e.target.files[0];
      const ext = file.name.split('.').pop().toLowerCase();
      const filePath = `logos/${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${ext}`;

      await uploadToVisualAssets(filePath, file, { preferResumable: false });
      const { data: urlData } = vfSupabaseClient.storage.from('visual-assets').getPublicUrl(filePath);

      const { error } = await vfSupabaseClient.from('assets_library').update({ logo_url: urlData.publicUrl }).eq('id', targetLogoCardId);
      if(error) throw error;
      
      e.target.value = '';
      await loadDataFromCloud();
      renderGallery();
      if(currentModalImgId && sameId(currentModalImgId, targetLogoCardId)) renderModal();
      showCloudStatus('云端状态：Logo 替换成功', 'ok');
    } catch (error) {
      showCloudStatus(`云端状态：Logo 替换失败（${readCloudError(error, '未知错误')}）`, 'err');
    }
  });

  window.addEventListener('beforeunload', () => {
    closeCloudSync();
  });

  window.addEventListener('load', async () => {
    const sessionUser = await tryRestoreServerSession();
    if (!sessionUser) return;
    const roleKey = sessionUser.role || 'viewer';
    currentUser = {
      id: sessionUser.id || `u_${roleKey}`,
      name: sessionUser.name || mapRoleToFallbackUser(roleKey).name,
      role: roleKey
    };
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-main').style.display = 'flex';
    document.getElementById('current-user-name').innerText = currentUser.name + ` (${currentUser.role})`;
    applyRolePermissions();
    showCloudStatus('云端状态：正在连接...', 'warn');
    try {
      await ensureSupabaseClient();
      await loadDataFromCloud();
      await setupCloudSync();
      updateI18nTexts();
      switchView('assets');
    } catch (error) {
      const msg = readCloudError(error, '云端连接失败');
      showCloudStatus(`云端状态：连接失败（${msg}）`, 'err');
      galleryContainer.innerHTML = `<div class="loading-state">云端连接失败：${msg}</div>`;
    }
  });
</script>
</body>
</html>
