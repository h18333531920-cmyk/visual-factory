        /* GCC unified creative workspace skin v1ui5 */
        :root {
            --primary: #101114;
            --primary-hover: #050608;
            --bg-canvas: #f4f5f3;
            --panel-bg: #ffffff;
            --card-bg: #f7f8f6;
            --border: #dcddd9;
            --text-main: #101114;
            --text-sub: #777c84;
            --danger: #d92d20;
            --accent-lime: #d8ff4f;
            --shadow: 0 24px 70px rgba(16, 17, 20, 0.10);
        }

        html,
        body {
            background:
                radial-gradient(circle at 48% 0%, rgba(214, 223, 236, 0.52), transparent 34%),
                #f4f5f3;
        }

        body {
            gap: 18px;
            padding: 26px 34px 30px;
            color: var(--text-main);
        }

        button,
        input,
        select,
        textarea {
            letter-spacing: 0;
        }

        .workspace-tabs {
            width: min(1680px, 100%);
            height: 28px;
            gap: 28px;
            color: var(--text-main);
            font-size: 14px;
        }

        .workspace-tabs strong {
            position: relative;
            font-weight: 880;
        }

        .workspace-tabs strong::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -8px;
            height: 3px;
            border-radius: 999px;
            background: var(--text-main);
        }

        .workspace-tabs button {
            color: #4e555f;
            font-weight: 620;
        }

        .workspace-tabs button.active {
            color: var(--text-main);
            font-weight: 880;
        }

        .editor-layout {
            width: min(1680px, 100%);
            max-width: 1680px;
            height: calc(100vh - 92px);
            gap: 30px;
        }

        .left-pane {
            background: #e8e8e6;
            border-radius: 8px;
            border: 0;
            box-shadow: none;
        }

        .left-pane::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(132, 139, 148, 0.20) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.40;
        }

        .ratio-nav,
        .canvas-actions {
            gap: 8px;
        }

        .ratio-nav button,
        .canvas-actions button {
            height: 30px;
            min-width: 68px;
            border: 1px solid var(--text-main);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--text-main);
            box-shadow: none;
            font-size: 12px;
            font-weight: 820;
        }

        .ratio-nav button.active,
        .canvas-actions button:last-child,
        .canvas-actions button.primary {
            border-color: var(--text-main);
            background: var(--text-main);
            color: #ffffff;
        }

        .canvas-wrapper {
            background: #ffffff;
            box-shadow: 0 16px 48px rgba(16, 17, 20, 0.06);
        }

        .artboard-preview-card {

<script>
    /* ================= 全局状态与常量 ================= */
    const ARTBOARD_PRESETS = [
        { id: 'head', ratio: 'head', label: '头图', w: 750, h: 500, apiRatio: '4:3' },
        { id: 'splash', ratio: 'splash', label: '开屏', w: 750, h: 1626, apiRatio: '9:16' },
        { id: 'banner', ratio: 'banner', label: 'Banner', w: 1396, h: 424, apiRatio: '16:9' }
    ];
    const FIXED_ARTBOARD_IDS = ['head', 'splash', 'banner'];
    const SIZES = {
        head: { w: 750, h: 500 },
        splash: { w: 750, h: 1626 },
        banner: { w: 1396, h: 424 },
        '1:1': { w: 1080, h: 1080 },
        '3:4': { w: 1080, h: 1440 },
        '4:3': { w: 1440, h: 1080 },
        '16:9': { w: 1920, h: 1080 },
        '9:16': { w: 1080, h: 1920 }
    };
    let currentArtboardId = 'head';
    let currentRatio = 'head'; let currentScale = 1;
    let activeLayerIds = []; 
    let customFonts = []; 
    let layers = []; // 万物皆图层
    let showSafeGuide = true;
    let overviewMode = false;
    let artboards = ARTBOARD_PRESETS.reduce((acc, preset) => {
        acc[preset.id] = { id: preset.id, label: preset.label, ratio: preset.ratio, layers: [] };
        return acc;
    }, {});

    let tagColorPresets = [{ id: 'c1', name: '品牌绿', bg: '#00D06C', text: '#FFFFFF', shadow: '#111827', shadowOpacity: 1 }, { id: 'c2', name: '警示红', bg: '#EF4444', text: '#FFFFFF', shadow: '#450a0a', shadowOpacity: 1 }];
    let arcColorPresets = [{ id: 'a1', name: '经典黄绿', cIn: '#FFCC00', cOut: '#00D06C' }, { id: 'a2', name: '极简黑白', cIn: '#111827', cOut: '#E5E7EB' }];
    let keywordTags = [
        { id: 'kw_food', name: '美食商业', prompt: '商业美食摄影，食物主体清晰，诱人质感，高级广告光影' },
        { id: 'kw_clean', name: '干净背景', prompt: '干净背景，画面简洁，留出版式和文字空间' },
        { id: 'kw_vivid', name: '鲜艳色彩', prompt: '高饱和色彩，明亮活泼，社交媒体广告风格' }
    ];
    let selectedKeywordTagIds = [];
    let presetLibrary = [];
    let tagPresetLibrary = [];
    let logoAssets = [];
    let activeTemplatePackId = null;
    let currentAssetTab = 'layout';
    let draggingLayerId = null;
    let aiProgressTimer = null;
    let historyStack = []; let historyIdx = -1; let isRestoring = false;
    const SHARED_TAG_PROPS = ['text', 'font', 'fontWeight', 'bgCol', 'textCol', 'shadowCol', 'shadowOpacity', 'shadowThickness', 'letterSpacing', 'tagPaddingX', 'tagTextOffsetY'];
    const SHARED_DISCOUNT_TAG_PROPS = ['mainText', 'topText', 'bottomText', 'font', 'fontWeight', 'bgCol', 'textCol', 'shadowCol', 'shadowOpacity', 'shadowThickness', 'letterSpacing', 'tagPaddingX', 'tagPaddingY', 'tagTextOffsetY', 'mainFontSize', 'topFontSize', 'bottomFontSize', 'sideGap', 'sideLineGap'];
    const SHARED_ARC_PROPS = ['cIn', 'cOut'];
    const SHARED_SOLID_PROPS = ['color'];

    /* ================= 数据持久化 ================= */
    const DB_NAME = 'SuperFactoryDB';
    const GLOBAL_STATE_KEY = 'global';
    function getGlobalSnapshot() { return { tagColorPresets, arcColorPresets, keywordTags, presetLibrary, tagPresetLibrary }; }
    function applyGlobalData(data = {}) {
        if(data.tagColorPresets) tagColorPresets = data.tagColorPresets.map(normalizeTagPreset);
        if(data.arcColorPresets) arcColorPresets = data.arcColorPresets;
        if(data.keywordTags) keywordTags = data.keywordTags;
        if(data.presetLibrary) presetLibrary = data.presetLibrary;
        if(data.tagPresetLibrary) tagPresetLibrary = data.tagPresetLibrary;
    }
    async function saveGlobalData() {
        const snapshot = getGlobalSnapshot();
        const dbOk = await saveStateToDB(snapshot);
        try {
            localStorage.setItem('sf_global_data', JSON.stringify({
                tagColorPresets,
                arcColorPresets,
                keywordTags,
                tagPresetLibrary,
                presetMeta: presetLibrary.map(p => ({ id: p.id, name: p.name, size: p.size, count: p.elements?.length || 0 }))
            }));
        } catch(e) {}
        return dbOk;
    }
    async function loadGlobalData() {
        let localData = null;
        try {
            const raw = localStorage.getItem('sf_global_data');
            if(raw) localData = JSON.parse(raw);
        } catch(e) {}
        if(localData) applyGlobalData(localData);

        const dbData = await loadStateFromDB();
        if(dbData) {
            applyGlobalData(dbData);
        } else if(localData && localData.presetLibrary) {
            await saveGlobalData();
        }
    }

    function initDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, 3); req.onupgradeneeded = e => { const db = e.target.result; if(!db.objectStoreNames.contains('fonts')) { db.createObjectStore('fonts', { keyPath: 'name' }); } if(!db.objectStoreNames.contains('logos')) { db.createObjectStore('logos', { keyPath: 'id' }); } if(!db.objectStoreNames.contains('state')) { db.createObjectStore('state', { keyPath: 'key' }); }}; req.onsuccess = e => resolve(e.target.result); req.onerror = e => reject(e.target.error); }); }
    async function saveStateToDB(value) { try { const db = await initDB(); const tx = db.transaction('state', 'readwrite'); tx.objectStore('state').put({ key: GLOBAL_STATE_KEY, value, updatedAt: new Date().toISOString() }); return await new Promise(resolve => { tx.oncomplete = () => resolve(true); tx.onerror = () => resolve(false); tx.onabort = () => resolve(false); }); } catch(e) { return false; } }
    async function loadStateFromDB() { try { const db = await initDB(); const tx = db.transaction('state', 'readonly'); const req = tx.objectStore('state').get(GLOBAL_STATE_KEY); return await new Promise(resolve => { req.onsuccess = e => resolve(e.target.result?.value || null); req.onerror = () => resolve(null); }); } catch(e) { return null; } }
    async function saveFontToDB(fontObj) { try { const db = await initDB(); const tx = db.transaction('fonts', 'readwrite'); tx.objectStore('fonts').put(fontObj); } catch(e) {} }
    async function saveLogoToDB(logoObj) { try { const db = await initDB(); const tx = db.transaction('logos', 'readwrite'); tx.objectStore('logos').put(logoObj); } catch(e) {} }
    async function deleteLogoFromDB(id) { try { const db = await initDB(); const tx = db.transaction('logos', 'readwrite'); tx.objectStore('logos').delete(id); } catch(e) {} }
    async function getAllFromDB(storeName) {
        try {
            const db = await initDB();
            const tx = db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll();
            return await new Promise(resolve => {
                req.onsuccess = e => resolve(e.target.result || []);
                req.onerror = () => resolve([]);
            });
        } catch(e) { return []; }
    }
    async function replaceStoreInDB(storeName, items = []) {
        try {
            const db = await initDB();
            const tx = db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            store.clear();
            items.forEach(item => store.put(item));
            return await new Promise(resolve => {
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => resolve(false);
                tx.onabort = () => resolve(false);
            });
        } catch(e) { return false; }
    }
    async function registerFontAsset(f) {
        if(!f || !f.id || !f.data) return false;
        try {
            const loaded = await new FontFace(f.id, `url(${f.data})`).load();
            document.fonts.add(loaded);
            await document.fonts.ready;
            if(!customFonts.some(item => item.name === f.name)) {
                customFonts.push({ name: f.name, value: f.value || cssFontFamily(f.id), data: f.data, id: f.id, fileName: f.fileName });
            }
            return true;
        } catch(e) { return false; }
    }
    async function loadFontsFromDB() {
        try { 
            const db = await initDB(); const tx = db.transaction('fonts', 'readonly'); const req = tx.objectStore('fonts').getAll();
            req.onsuccess = e => { 
                const fonts = e.target.result;
                if (fonts && fonts.length > 0) { 
                    let loadedCount = 0; 
                    fonts.forEach(f => {
                        registerFontAsset(f).then(() => {
                            loadedCount++; 
                            if(loadedCount === fonts.length) { renderSettings(); renderProperties(); showToast(`成功恢复 ${fonts.length} 个持久化字体`); } 
                        });
                    }); 
                }
            };
        } catch(e) {}
    }
    async function loadLogosFromDB() {
        try {
            const db = await initDB(); const tx = db.transaction('logos', 'readonly'); const req = tx.objectStore('logos').getAll();
            req.onsuccess = e => { logoAssets = e.target.result || []; renderAssetLibrary(); };
        } catch(e) {}
    }

    function cloneData(value) {
        return JSON.parse(JSON.stringify(value));
    }
    function getFixedArtboardPresets() {
        return ARTBOARD_PRESETS.filter(p => FIXED_ARTBOARD_IDS.includes(p.id));
    }
    function getCustomArtboardPresets() {
        return ARTBOARD_PRESETS.filter(p => !FIXED_ARTBOARD_IDS.includes(p.id));
    }
    function isCustomArtboardId(id = currentArtboardId) {
        return !FIXED_ARTBOARD_IDS.includes(id) && !!ARTBOARD_PRESETS.find(p => p.id === id);
    }
    function getArtboardPreset(id = currentArtboardId) {
        return ARTBOARD_PRESETS.find(p => p.id === id) || ARTBOARD_PRESETS[0];
    }
    function getArtboardTopLabel(preset) {
        const size = SIZES[preset.ratio] || preset;
        return `${preset.label} ${size.w}×${size.h}`;
    }
    function createCustomArtboardPreset({ id = genId('custom_board'), label = '自定义', w = 1080, h = 1080 } = {}, switchTo = true) {
        const safeW = Math.max(64, Math.min(6000, Math.round(Number(w) || 1080)));
        const safeH = Math.max(64, Math.min(6000, Math.round(Number(h) || 1080)));
        const safeLabel = String(label || '自定义').trim().slice(0, 16) || '自定义';
        const ratio = id;
        const existing = ARTBOARD_PRESETS.find(p => p.id === id);
        if(existing) {
            existing.label = safeLabel;
            existing.ratio = ratio;
            existing.w = safeW;
            existing.h = safeH;
        } else {
            ARTBOARD_PRESETS.push({ id, ratio, label: safeLabel, w: safeW, h: safeH, apiRatio: '1:1', custom: true });
        }
        SIZES[ratio] = { w: safeW, h: safeH };
        if(!artboards[id]) artboards[id] = { id, label: safeLabel, ratio, layers: [] };
        artboards[id].label = safeLabel;
        artboards[id].ratio = ratio;
        renderCustomArtboardControls();
        if(switchTo) switchArtboard(id);
        return id;
    }
    function updateCustomArtboardSize(id, { label, w, h } = {}) {
        const preset = getCustomArtboardPresets().find(p => p.id === id);
        if(!preset) return false;
        saveCurrentArtboardState();
        const oldSize = SIZES[preset.ratio] || { w: preset.w || 1080, h: preset.h || 1080 };
        const safeW = Math.max(64, Math.min(6000, Math.round(Number(w) || oldSize.w)));
        const safeH = Math.max(64, Math.min(6000, Math.round(Number(h) || oldSize.h)));
        const sx = safeW / Math.max(1, oldSize.w);
        const sy = safeH / Math.max(1, oldSize.h);
        const uniform = Math.min(sx, sy);
        const safeLabel = String(label || preset.label || '自定义').trim().slice(0, 16) || '自定义';
        preset.label = safeLabel;
        preset.w = safeW;
        preset.h = safeH;
        SIZES[preset.ratio] = { w: safeW, h: safeH };
        const board = artboards[id];
        if(board) {
            board.label = safeLabel;
            board.ratio = preset.ratio;
            board.layers = (board.layers || []).map(layer => {
                const next = cloneData(layer);
                next.x = (Number(next.x) || oldSize.w / 2) * sx;
                next.y = (Number(next.y) || oldSize.h / 2) * sy;
                if(next.type === 'solid' || next.role === 'extended-background') {
                    next.x = safeW / 2;
                    next.y = safeH / 2;
                    next.baseW = safeW;
                    next.baseH = safeH;
                    next.scale = 1;
                } else if(next.type === 'image') {
                    next.baseW = Math.max(1, Math.round((Number(next.baseW) || oldSize.w) * sx));
                    next.baseH = Math.max(1, Math.round((Number(next.baseH) || oldSize.h) * sy));
                } else if(next.type === 'logo') {
                    next.baseW = Math.max(1, Math.round((Number(next.baseW) || 260) * uniform));
                    next.baseH = Math.max(1, Math.round((Number(next.baseH) || 160) * uniform));
                } else {
                    next.scale = (Number(next.scale) || 1) * uniform;
                }
                return next;
            });
        }
        if(currentArtboardId === id) {
            layers = cloneData(board?.layers || []);
            currentRatio = preset.ratio;
            activeLayerIds = activeLayerIds.filter(layerId => layers.some(l => l.id === layerId));
        }
        renderCustomArtboardControls();
        syncArtboardTabs();
        syncRatioNav();
        resizeCanvas();
        renderCanvas();
        renderLayersList();
        renderProperties();
        return true;
    }
    function restoreCustomArtboardPresets(presets = []) {
        const customIds = new Set((presets || []).map(p => p.id).filter(Boolean));
        for(let i = ARTBOARD_PRESETS.length - 1; i >= 0; i--) {
            const preset = ARTBOARD_PRESETS[i];
            if(!FIXED_ARTBOARD_IDS.includes(preset.id) && !customIds.has(preset.id)) {
                ARTBOARD_PRESETS.splice(i, 1);
                delete SIZES[preset.ratio];
            }
        }
        (presets || []).forEach(preset => {
            createCustomArtboardPreset({
                id: preset.id,
                label: preset.label,
                w: preset.w || SIZES[preset.ratio]?.w || 1080,
                h: preset.h || SIZES[preset.ratio]?.h || 1080
            }, false);
        });
        renderCustomArtboardControls();
    }
    function normalizeArtboardSnapshot(snapshot = {}) {
        const next = ARTBOARD_PRESETS.reduce((acc, preset) => {
            const incoming = snapshot[preset.id] || {};
            acc[preset.id] = {
                id: preset.id,
                label: preset.label,
                ratio: preset.ratio,
                layers: cloneData(incoming.layers || [])
            };
            return acc;
        }, {});
        return next;
    }
    function saveCurrentArtboardState() {
        if(!artboards[currentArtboardId]) {
            const preset = getArtboardPreset(currentArtboardId);
            artboards[currentArtboardId] = { id: preset.id, label: preset.label, ratio: preset.ratio, layers: [] };
        }
        artboards[currentArtboardId].ratio = currentRatio;
        artboards[currentArtboardId].layers = cloneData(layers);
    }
    function loadArtboard(id, saveCurrent = true) {
        if(!artboards[id]) return;
        if(saveCurrent) saveCurrentArtboardState();
        const preset = getArtboardPreset(id);
        currentArtboardId = id;
        currentRatio = preset.ratio;
        layers = cloneData(artboards[id].layers || []);
        activeLayerIds = activeLayerIds.filter(layerId => layers.some(l => l.id === layerId));
        syncArtboardTabs();
        syncRatioNav();
        resizeCanvas();
        renderCanvas();
        renderLayersList();
        renderProperties();
        renderAssetLibrary();
    }
    function switchArtboard(id) {
        const wasOverview = overviewMode;
        if(overviewMode) overviewMode = false;
        if(id === currentArtboardId) { if(wasOverview) syncOverviewMode(); return; }
        loadArtboard(id, true);
        saveHistory();
        syncOverviewMode();
    }
    function syncArtboardTabs() {
        renderCustomArtboardControls();
        document.querySelectorAll('.artboard-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.artboard === currentArtboardId);
        });

        ctx.fillStyle = green;

            top.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillRect(0, 0, target.w, photoY + 80);
            const bottom = ctx.createLinearGradient(0, photoY + photoH - 80, 0, target.h);
            bottom.addColorStop(0, 'rgba(0,0,0,0)');

    function softenGeneratedSeams(ctx, sourceImg, targetId, frame) {
        const target = { w: ctx.canvas.width, h: ctx.canvas.height };

        soft.height = target.h;
        const softCtx = soft.getContext('2d');

        softCtx.drawImage(sourceImg, -8, -8, target.w + 16, target.h + 16);

        if(targetId === 'banner') {
            const center = frame.x;
            const width = Math.max(90, Math.round(target.w * 0.075));
            const x = Math.max(0, center - width / 2);
            const w = Math.min(target.w - x, width);
            const grad = maskCtx.createLinearGradient(x, 0, x + w, 0);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.5, 'rgba(0,0,0,0.28)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            maskCtx.fillStyle = grad;
            maskCtx.fillRect(x, 0, w, target.h);
        } else {
            const height = Math.max(70, Math.round(target.h * 0.055));
            [frame.y, frame.y + frame.h].forEach(center => {
                const y = Math.max(0, center - height / 2);
                const h = Math.min(target.h - y, height);
                const grad = maskCtx.createLinearGradient(0, y, 0, y + h);
                grad.addColorStop(0, 'rgba(0,0,0,0)');

    function renderCanvas() {
        const container = document.getElementById('dynamic-layers'); container.innerHTML = '';

            container.appendChild(createLayerElement(l, { active: activeLayerIds.includes(l.id), interactive: true }));
        });
        renderArtboardPreviews();
    }
    function renderArtboardPreviews() {
        saveCurrentArtboardState();
        const dock = document.getElementById('artboard-preview-dock');
        if(!dock) return;
        dock.innerHTML = '';
        ARTBOARD_PRESETS.forEach(preset => {
            const size = SIZES[preset.ratio];
            const card = document.createElement('button');
            card.type = 'button';
            card.className = `artboard-preview-card ${preset.id === currentArtboardId ? 'active' : ''}`;
            card.onclick = () => switchArtboard(preset.id);
            const maxPreviewW = preset.id === 'banner' ? 430 : (preset.id === 'splash' ? 220 : 260);
            const maxPreviewH = preset.id === 'splash' ? 470 : 190;
            const scale = Math.min(maxPreviewW / size.w, maxPreviewH / size.h);
            const viewportW = Math.max(34, Math.round(size.w * scale));
            const viewportH = Math.max(34, Math.round(size.h * scale));
            card.innerHTML = `<div class="artboard-preview-title"><span>${preset.label}</span><span>${size.w}×${size.h}</span></div><div class="artboard-preview-viewport" style="width:${viewportW}px;height:${viewportH}px;"><div class="artboard-preview-canvas" style="width:${size.w}px;height:${size.h}px;transform:scale(${scale});"><div class="preview-layers"></div></div></div>`;
            const layerRoot = card.querySelector('.preview-layers');
            (artboards[preset.id]?.layers || []).slice().sort((a,b) => a.zIndex - b.zIndex).forEach(layer => {
                layerRoot.appendChild(createLayerElement(layer, { active: false, interactive: false, idPrefix: `preview_${preset.id}_` }));

    function renderLayersList() {
        const listUI = document.getElementById('layer-list-ui'); listUI.innerHTML = '';
        [...layers].sort((a,b) => b.zIndex - a.zIndex).forEach(l => {
            const li = document.createElement('div'); li.className = `layer-item ${activeLayerIds.includes(l.id) ? 'active' : ''}`;
            li.draggable = true; li.dataset.id = l.id;
            li.ondragstart = e => { draggingLayerId = l.id; li.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
            li.ondragend = () => { draggingLayerId = null; li.classList.remove('dragging'); };
            li.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
            li.ondrop = e => { e.preventDefault(); reorderLayerByDrop(draggingLayerId, l.id); };
            li.onclick = (e) => { 
                if(!e.target.closest('button')) { 
                    preservePaneScroll(() => {
                        if(e.shiftKey) { if(activeLayerIds.includes(l.id)) activeLayerIds = activeLayerIds.filter(x => x !== l.id); else activeLayerIds.push(l.id); } else { activeLayerIds = [l.id]; }
                        renderCanvas(); renderLayersList(); renderProperties(); 
                    });
                } 
            };
            const icon = getLayerIcon(l);
            li.innerHTML = `<div style="display:flex; align-items:center; min-width:0;"><span class="drag-handle">⋮⋮</span><span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${icon}</span></div><div class="layer-actions"><button class="l-btn" onclick="toggleLock('${l.id}')">${l.locked ? '🔒' : '🔓'}</button><button class="l-btn" style="color:var(--danger);" onclick="deleteLayer('${l.id}')">✖</button></div>`;
            listUI.appendChild(li);
        });
    }

    function reorderLayerByDrop(fromId, toId) {
        if(!fromId || !toId || fromId === toId) return;
        preservePaneScroll(() => {
            const ordered = [...layers].sort((a,b) => b.zIndex - a.zIndex);
            const fromIdx = ordered.findIndex(l => l.id === fromId);
            const toIdx = ordered.findIndex(l => l.id === toId);
            if(fromIdx < 0 || toIdx < 0) return;
            const [moved] = ordered.splice(fromIdx, 1);
            ordered.splice(toIdx, 0, moved);
            ordered.forEach((l, idx) => { l.zIndex = ordered.length - idx; });
            renderCanvas(); renderLayersList(); renderProperties(); saveHistory();
        });
    }

    document.getElementById('canvas-wrapper').addEventListener('mousedown', e => {
        hasDragged = false; const wrap = e.target.closest('.layer-base');
        if(wrap) { 
            const id = wrap.dataset.id; const l = layers.find(x => x.id === id); if(!l || l.locked) return; 
            if(e.shiftKey) { if(!activeLayerIds.includes(id)) activeLayerIds.push(id); } 
            else { if(!activeLayerIds.includes(id)) activeLayerIds = [id]; }
            isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY; 
            dragData = activeLayerIds.map(selId => ({ id: selId, ix: layers.find(x => x.id === selId).x, iy: layers.find(x => x.id === selId).y }));
            renderCanvas(); renderLayersList(); renderProperties(); 
        } else { activeLayerIds = []; renderCanvas(); renderLayersList(); renderProperties(); }
    });
    window.addEventListener('mousemove', e => { 
        if(isDragging && activeLayerIds.length > 0) { 
            hasDragged = true; let dx = (e.clientX - dragStartX) / currentScale; let dy = (e.clientY - dragStartY) / currentScale;
            if(e.shiftKey) {
                if(Math.abs(dx) >= Math.abs(dy)) dy = 0;
                else dx = 0;
            }
            dragData.forEach(data => { const l = layers.find(x => x.id === data.id); if(l) { l.x = data.ix + dx; l.y = data.iy + dy; document.getElementById(data.id).style.left = l.x + 'px'; document.getElementById(data.id).style.top = l.y + 'px'; }});
        } 
    });
    window.addEventListener('mouseup', e => { 
        if(isDragging) { 
            isDragging = false; saveHistory(); 
            const wrap = e.target.closest('.layer-base');

    function positionAssetHoverPreview(anchor) {
        const el = document.getElementById('asset-hover-preview');
        if(!el || !anchor) return;
        const rect = anchor.getBoundingClientRect();
        const previewW = el.offsetWidth || 465;
        const previewH = el.offsetHeight || 240;
        const gap = 14;
        let left = rect.left - previewW - gap;
        if(left < 16) left = rect.right + gap;
        left = Math.min(window.innerWidth - previewW - 16, Math.max(16, left));
        let top = rect.top + rect.height / 2 - previewH / 2;
        top = Math.min(window.innerHeight - previewH - 16, Math.max(16, top));
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
    }

    function renderAssetPreview(root, { type, asset, img }) {

            const ratio = board?.ratio || 'head';
            root.appendChild(createMiniArtboardPreview(board?.layers || [], ratio, { maxW: large ? 405 : 138, maxH: large ? 267 : 92 }));

    function createMiniArtboardPreview(sourceLayers, ratio, options = {}) {
        const maxW = options.maxW || 140;
        const maxH = options.maxH || 90;
        const size = SIZES[ratio] || SIZES.head;
        const scale = Math.min(maxW / size.w, maxH / size.h);
        const viewportW = Math.max(24, Math.round(size.w * scale));
        const viewportH = Math.max(24, Math.round(size.h * scale));
        const viewport = document.createElement('div');
        viewport.className = 'asset-preview-stage';
        viewport.style.width = viewportW + 'px';
        viewport.style.height = viewportH + 'px';
        const canvas = document.createElement('div');
        canvas.className = 'asset-preview-canvas';
        canvas.style.width = size.w + 'px';
        canvas.style.height = size.h + 'px';
        canvas.style.transform = `scale(${scale})`;
        (sourceLayers || []).slice().sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0)).forEach(layer => {
            canvas.appendChild(createLayerElement(layer, { active: false, interactive: false, idPrefix: `asset_${genId('prev')}_` }));
        });
        viewport.appendChild(canvas);
        return viewport;
    }
    function createLayerGroupPreview(sourceLayers, options = {}) {
        const maxW = options.maxW || 140;
        const maxH = options.maxH || 90;
        const group = sourceLayers || [];
        const bounds = getGroupBounds(group) || { x1: 0, y1: 0, w: 300, h: 120 };
        const padding = 36;
        const stageW = Math.max(80, bounds.w + padding * 2);
        const stageH = Math.max(54, bounds.h + padding * 2);
        const scale = Math.min(maxW / stageW, maxH / stageH);
        const viewport = document.createElement('div');
        viewport.className = 'asset-preview-stage';
        viewport.style.width = Math.round(stageW * scale) + 'px';
        viewport.style.height = Math.round(stageH * scale) + 'px';
        const canvas = document.createElement('div');
        canvas.className = 'asset-preview-canvas';
        canvas.style.width = stageW + 'px';
        canvas.style.height = stageH + 'px';
        canvas.style.transform = `scale(${scale})`;
        group.slice().sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0)).forEach(layer => {
            const cloned = cloneData(layer);
            cloned.x = (Number(cloned.x) || 0) - bounds.x1 + padding;
            cloned.y = (Number(cloned.y) || 0) - bounds.y1 + padding;
            canvas.appendChild(createLayerElement(cloned, { active: false, interactive: false, idPrefix: `asset_tag_${genId('prev')}_` }));
        });
        viewport.appendChild(canvas);
        return viewport;
    }

    function applyLayoutPreset(id) {
        const p = presetLibrary.find(x => x.id === id); if(!p) return;
        if(p.kind === 'pack') return applyTemplatePack(p);
        const currentImages = layers.filter(l => l.type === 'image').map(l => JSON.parse(JSON.stringify(l)));
        const newLayers = adaptPresetElementsToCurrent(p.elements, p.size);
        if(currentImages.length > 0) {
            const presetImages = newLayers.filter(l => l.type === 'image');
            if(presetImages.length > 0) {
                presetImages.forEach((imgLayer, index) => {
                    const currentImage = currentImages[index] || currentImages[currentImages.length - 1];
                    const placeholderZ = imgLayer.zIndex;
                    Object.keys(imgLayer).forEach(key => delete imgLayer[key]);
                    Object.assign(imgLayer, { ...currentImage, id: genId('image'), zIndex: placeholderZ, locked: false, flipX: currentImage.flipX ?? false });
                });
                if(currentImages.length > presetImages.length) {
                    const minZ = newLayers.length > 0 ? Math.min(...newLayers.map(l => l.zIndex)) : 1;
                    currentImages.slice(presetImages.length).forEach((img, index) => {
                        newLayers.push({ ...img, id: genId('image'), zIndex: minZ - currentImages.length + index, locked: false, flipX: img.flipX ?? false });
                    });
                }
            } else {
                const minZ = newLayers.length > 0 ? Math.min(...newLayers.map(l => l.zIndex)) : 1;
                currentImages.forEach((img, index) => {
                    newLayers.push({ ...img, id: genId('image'), zIndex: minZ - currentImages.length + index, locked: false, flipX: img.flipX ?? false });
                });
            }
        }
        layers = newLayers;
        activeLayerIds = newLayers.filter(l => l.type !== 'image').map(l => l.id);
        if(activeLayerIds.length === 0) activeLayerIds = newLayers.map(l => l.id);
        saveHistory(); renderCanvas(); renderLayersList(); renderProperties(); showToast(currentImages.length > 0 ? '已套用版式，并保留当前图片' : '已切换到该版式');
    }

    async function saveTemplatePack() {

        });
        const pack = { id: genId('pack'), kind: 'pack', name, artboards: packArtboards, createdAt: new Date().toISOString() };

    function getLayerBounds(l) {

            const h = (Number(l.baseH) || 160) * scale;

        }
        if(l.type === 'tag') {

            const w = (textLen * 28 + 116) * scale;
            const h = 78 * scale;
            return { x1: l.x - w / 2, y1: l.y - h / 2, x2: l.x + w / 2, y2: l.y + h / 2, w, h, cx: l.x, cy: l.y, area: w * h };
        }

            const sideLen = Math.max(String(l.topText || '').length, String(l.bottomText || '').length, 1);
            const sideSize = Math.max(Number(l.topFontSize) || Number(l.sideFontSize) || 52, Number(l.bottomFontSize) || Number(l.sideFontSize) || 42);
            const w = (mainLen * (Number(l.mainFontSize) || 96) * 0.64 + sideLen * sideSize * 0.72 + (Number(l.sideGap) || 8) + (Number(l.tagPaddingX) || 34) * 2) * scale;

        }

            const wIn = Number(l.wIn) || 40;
            const wOut = Number(l.wOut) || 120;
            const size = (rIn + wIn + wOut) * 2 * scale;
            return { x1: l.x - size / 2, y1: l.y - size / 2, x2: l.x + size / 2, y2: l.y + size / 2, w: size, h: size, cx: l.x, cy: l.y, area: size * size };

    function getGroupBounds(group) {

        const x2 = Math.max(...boxes.map(b => b.x2));
        const y2 = Math.max(...boxes.map(b => b.y2));

    function clampLayerToSafeArea(l, target, safe) {

        const minX = safe + b.w / 2;

        const minY = safe + b.h / 2;
        const maxY = target.h - safe - b.h / 2;
        if(maxX >= minX) l.x = Math.min(maxX, Math.max(minX, l.x));
        if(maxY >= minY) l.y = Math.min(maxY, Math.max(minY, l.y));

    function classifyHeadLayers(sourceLayers, sourceSize) {

            .map(l => ({ layer: l, bounds: getLayerBounds(l) }))
            .sort((a, b) => b.bounds.area - a.bounds.area);
        const background = imageCandidates.find(item => item.bounds.area >= canvasArea * 0.55)?.layer
            || [...images].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0))[0]

    function transformLayerForArtboard(layer, sourceSize, targetPreset, meta) {
        const target = SIZES[targetPreset.ratio];

        l.locked = false;

        const srcYRatio = (Number(layer.y) || sourceSize.h / 2) / sourceSize.h;

            l.role = 'extended-background';

                l.y = target.h * 0.45;

                l.baseH = sourceSize.h;
                l.scale = 2.18;
                l.zIndex = (Number(layer.zIndex) || 1) + 1;

            }
            if(targetPreset.id === 'banner') {
                l.x = target.w * 0.76;
                l.y = target.h * 0.50;
                l.baseW = target.w * 0.54;
                l.baseH = target.h;

            const targetCx = targetPreset.id === 'banner' ? target.w * 0.26 : target.w * 0.47;
            const targetCy = targetPreset.id === 'banner' ? target.h * 0.42 : target.h * 0.19;

    function buildExtendedArtboard(targetId, sourceLayers) {

        if(!pane) return;
        ['dragenter', 'dragover'].forEach(type => {
            pane.addEventListener(type, e => {
                if(!isFileDragEvent(e)) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                pane.classList.add('drag-file-over');
            });
        });
        ['dragleave', 'dragend'].forEach(type => {
            pane.addEventListener(type, e => {
                if(type === 'dragleave' && pane.contains(e.relatedTarget)) return;
                pane.classList.remove('drag-file-over');
            });
        });
        pane.addEventListener('drop', e => {
            if(!isFileDragEvent(e)) return;
            e.preventDefault();
            pane.classList.remove('drag-file-over');
            handleDroppedImageFiles(e.dataTransfer.files);
        });
    }
    document.getElementById('bg-upload').addEventListener('change', e => { 
        const file = e.target.files[0]; if(!file) return;
        importImageFile(file).then(ok => {
            if(ok) showToast('已导入图片，默认完整显示');
        }).catch(err => {
            const reader = new FileReader();
            reader.onload = ev => {
                addLayer('image', { src: ev.target.result });
                showToast('图片已导入，但尺寸读取失败，已按铺满模式放入', true);
            };
            reader.readAsDataURL(file);
        }).finally(() => { e.target.value = ''; });
    });

    document.getElementById('logo-upload').addEventListener('change', e => {
        const files = [...e.target.files]; if(files.length === 0) return;
        let loaded = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = ev => {
                const logo = { id: genId('logo_asset'), name: file.name.replace(/\.[^/.]+$/, ''), src: ev.target.result };
                logoAssets.push(logo); saveLogoToDB(logo); loaded++;
                if(loaded === files.length) { currentAssetTab = 'logo'; switchAssetTab('logo'); showToast(`已保存 ${files.length} 个 Logo 素材`); }
            };
            reader.readAsDataURL(file);
        });
        e.target.value = '';
    });

    document.getElementById('backup-import').addEventListener('change', e => {
        const file = e.target.files[0]; if(!file) return;
        importAssetBackupFile(file);
        e.target.value = '';
    });
    
    document.getElementById('font-upload').addEventListener('change', e => { 
        const file = e.target.files[0]; if(!file) return; const name = file.name.replace(/\.[^/.]+$/, ""); 
        if(customFonts.some(f => f.name === name)) { showToast(`字体 [${name}] 已存在，请勿重复上传`, true); e.target.value = ''; return; } 
        const fontName = 'CF_' + Date.now(); const reader = new FileReader(); 
        
        reader.onload = ev => { 
            const fontDataUrl = normalizeFontDataUrl(ev.target.result, file.name);
            const font = new FontFace(fontName, `url(${fontDataUrl})`); 
            
            font.load().then(async loaded => { 
                document.fonts.add(loaded); 
                await document.fonts.ready;
                const fontValue = cssFontFamily(fontName);
                const fontData = { name: name, value: fontValue, data: fontDataUrl, id: fontName, fileName: file.name }; 
                customFonts.push(fontData); saveFontToDB(fontData); 
                if(activeLayerIds.length === 1) { const l = layers.find(x => x.id === activeLayerIds[0]); if(l && ['tag', 'discountTag'].includes(l.type)) { l.font = fontValue; renderCanvas(); } } 
                renderProperties(); renderSettings(); showToast(`字体 [${name}] 安装且持久化成功`); saveHistory(); 
            }).catch(() => showToast('字体解析失败，请确保格式正确', true)); 
        }; 
        reader.readAsDataURL(file); e.target.value = ''; 
    });

    /* ================= AI 图形引擎集成 ================= */
    async function generateAIBG() {
        const p = getPromptText(); if(!p) return showToast('请输入描述词或选择关键词标签', true);
        const btn = window.event?.target || document.activeElement;
        const ogText = btn?.innerText || '生成新图';
        if(btn) { btn.innerText = '⏳ 渲染中...'; btn.disabled = true; }
        startAIProgress('AI 正在生成新图片...');
        try {
            updateAIProgress('正在提交生成请求...', 22);
            const res = await fetch('/api/generate-image', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: p, ratio: getGenerationRatio() }) });
            updateAIProgress('模型正在生成画面...', 70);
            const data = await res.json(); 
            if(data.success) { addLayer('image', { src: `data:image/png;base64,${data.imageBase64}` }); showToast('✅ 成功生成新图片'); } else { showToast('❌ ' + (data.message || `生成失败（HTTP ${res.status}）`), true); }
        } catch(e) { showToast('❌ ' + (e.message || '无法连接服务器'), true); } finally { updateAIProgress('正在应用到画布...', 96); stopAIProgress(); if(btn) { btn.innerText = ogText; btn.disabled = false; } }
    }
    
    // 真扩图：把原图和需要扩展的方向比例交给后端 outpainting 接口。
    async function outpaintAIBG() {
        let targetLayer = null;
        if(activeLayerIds.length === 1) { const l = layers.find(x => x.id === activeLayerIds[0]); if(l && l.type === 'image') targetLayer = l; }
        if(!targetLayer) { targetLayer = layers.find(l => l.type === 'image'); }
        if(!targetLayer) return showToast('请先生成或选中一张图片图层', true);
        
        const p = getPromptText(); 
        if(!p) return showToast('请输入扩图引导或选择关键词标签', true);
        
        const btn = window.event?.target || document.activeElement; const ogText = btn?.innerText || '智能扩图'; if(btn) { btn.innerText = '🪄 读取原图...'; btn.disabled = true; }
        startAIProgress('正在读取原图并计算扩展区域...');
        
        try {
            const {w, h} = SIZES[currentRatio];
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = targetLayer.src;
            await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = () => reject(new Error('原图读取失败')); });
            const expand = getOutpaintExpand(img.width, img.height, w, h);
            const base64Image = stripDataUrl(targetLayer.src);
            if(btn) btn.innerText = '🪄 调用真扩图...';
            updateAIProgress('正在上传原图并调用智能扩图...', 32);
            
            const res = await fetch('/api/outpaint-image', { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ prompt: p, ratio: getGenerationRatio(), baseImage: base64Image, expand })
            });
            updateAIProgress('AI 正在延展背景...', 74);
            const data = await res.json(); 
            
            if(data.success) { 
                targetLayer.src = `data:image/jpeg;base64,${data.imageBase64}`; targetLayer.scale = 1; targetLayer.rotation = 0; targetLayer.x = w/2; targetLayer.y = h/2; targetLayer.baseW = w; targetLayer.baseH = h;
                renderCanvas(); saveHistory(); showToast('✅ 扩图成功，主体已完美保留！'); 
            } else {
                throw new Error(data.message || `HTTP ${res.status}`);
            }
        } catch(e) {
            try {
                await applyLocalExtendedBackground(currentArtboardId, targetLayer, targetLayer);
                renderCanvas();
                saveHistory();
                showToast('AI 扩图暂不可用，已使用本地补底方案');
            } catch(fallbackError) {
                showToast('❌ 扩图失败: ' + (e.message || fallbackError.message || '请看后端终端日志'), true);
            }
        } finally { updateAIProgress('正在应用扩图结果...', 96); stopAIProgress(); if(btn) { btn.innerText = ogText; btn.disabled = false; } }
    }

    async function renderCurrentArtboardBlob(scale = 3) {
        const wrap = document.getElementById('canvas-wrapper');
        const safeGuide = document.getElementById('safe-guide');
        const origCss = wrap.style.cssText;
        const oldGuideDisplay = safeGuide ? safeGuide.style.display : '';
        const {w, h} = SIZES[currentRatio];
        if(safeGuide) safeGuide.style.display = 'none';
        wrap.style.cssText = `position: fixed; left: 0px; top: 0px; width: ${w}px; height: ${h}px; transform: none; z-index: 10001; background: #FFFFFF; overflow: hidden;`;
        try {
            void wrap.offsetWidth;
            await waitForImagesIn(wrap);
            await new Promise(r => setTimeout(r, 300));
            const canvas = await html2canvas(wrap, { scale, useCORS: true, allowTaint: true, backgroundColor: '#FFFFFF', logging: false, imageTimeout: 0 });
            return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        } finally {
            wrap.style.cssText = origCss;
            if(safeGuide) safeGuide.style.display = oldGuideDisplay;
            syncSafeGuide();
        }
    }
    function downloadBlob(blob, filename) {
        if(!blob) throw new Error('empty blob');
        const link = document.createElement('a');
        link.download = filename;
        link.href = URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
    }
    async function exportPNG() {
        if(layers.length === 0) return showToast('画板为空，无法导出', true);
        await document.fonts.ready;
        const oldActive = [...activeLayerIds];
        const overlay = document.getElementById('export-overlay');
        activeLayerIds = [];
        renderCanvas(); renderLayersList(); renderProperties();
        overlay.style.display = 'flex';
        try {
            const blob = await renderCurrentArtboardBlob(3);
            downloadBlob(blob, `GCC_${getArtboardPreset(currentArtboardId).label}_${Date.now()}.png`);
            showToast('✅ 3倍超清 PNG 导出成功');
        } catch (e) {
            showToast('❌ 导出异常', true);
        } finally {
            overlay.style.display = 'none';
            activeLayerIds = oldActive;
            renderCanvas(); renderLayersList(); renderProperties();
        }
    }
    async function exportAllArtboards() {
        saveCurrentArtboardState();
        const exportable = ARTBOARD_PRESETS.filter(p => (artboards[p.id]?.layers || []).length > 0);
        if(exportable.length === 0) return showToast('三个画布都是空的，无法导出', true);
        await document.fonts.ready;
        const originalArtboardId = currentArtboardId;
        const originalActive = [...activeLayerIds];
        const overlay = document.getElementById('export-overlay');
        overlay.style.display = 'flex';
        try {
            for(const preset of exportable) {
                loadArtboard(preset.id, false);
                activeLayerIds = [];
                renderCanvas(); renderLayersList(); renderProperties();
                const blob = await renderCurrentArtboardBlob(3);
                downloadBlob(blob, `GCC_${preset.label}_${Date.now()}.png`);
                await new Promise(r => setTimeout(r, 180));
            }
            showToast(`✅ 已导出 ${exportable.length} 个画布`);
        } catch(e) {
            showToast('❌ 批量导出异常', true);
        } finally {
            loadArtboard(originalArtboardId, false);
            activeLayerIds = originalActive.filter(id => layers.some(l => l.id === id));
            renderCanvas(); renderLayersList(); renderProperties();
            overlay.style.display = 'none';
        }
    }

    async function bootApp() {
        await loadGlobalData();
        loadFontsFromDB();
        loadLogosFromDB();
        setupCanvasDropImport();
        renderCustomArtboardControls();
        syncRatioNav();
        resizeCanvas();
        renderCanvas();
        renderLayersList();
        renderProperties();
        renderAssetLibrary();
        renderPromptTags();
        saveHistory();
    }
    bootApp();

</script>
